name: E2E

# Skeleton workflow. Enabled fully once the NovaOS web app (Milestone 7) exists.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # No `version:` — read the pinned pnpm version from package.json's
      # `packageManager` field to avoid ERR_PNPM_BAD_PM_VERSION.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: pnpm test:e2e

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          # The skeleton harness may not emit a report (e.g. failure before the
          # test step). Don't turn a missing report into a noisy warning.
          if-no-files-found: ignore
