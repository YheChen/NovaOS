name: Deploy workspace to Pages

# Builds the NovaOS workspace SPA and deploys it to GitHub Pages. Runs on a
# version tag (e.g. v1.0.0) or on demand. Requires Pages to be enabled for the
# repository (Settings → Pages → Source: GitHub Actions).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SPA
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: pnpm --filter @novaos/web build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
